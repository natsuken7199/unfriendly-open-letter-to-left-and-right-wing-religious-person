<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    좌우익 종교인을 향한 불친절한 공개서한
  </title>

  <style>

    body{
      margin:0;
      padding:0;

      background:#0a0a0a;
      color:#d8d8d8;

      font-family:
        "Noto Serif KR",
        serif;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;

      text-align:center;
    }

    .container{
      width:90%;
      max-width:1100px;

      padding:
        80px 20px;
    }

    .covers{
      display:flex;

      justify-content:center;
      align-items:flex-start;

      gap:40px;

      flex-wrap:wrap;

      margin-bottom:60px;
    }

    .covers img{
      width:320px;
      max-width:90vw;

      box-shadow:
        0 0 40px rgba(0,0,0,0.6);

      transition:0.25s;
    }

    .covers img:hover{
      transform:translateY(-4px);
    }

    h1{
      font-size:2.1rem;

      line-height:1.7;

      font-weight:normal;

      margin-bottom:22px;
    }

    .author{
      color:#8a8a8a;

      letter-spacing:0.05em;

      margin-bottom:45px;

      font-size:1rem;
    }

    .description{
      color:#767676;

      line-height:1.9;

      font-size:0.95rem;

      margin-bottom:55px;
    }

    .download-button{
      display:inline-block;

      padding:
        15px 34px;

      border:
        1px solid #555;

      color:#e2e2e2;

      text-decoration:none;

      transition:0.2s;

      font-size:0.95rem;

      letter-spacing:0.03em;
    }

    .download-button:hover{
      background:#181818;

      border-color:#888;
    }

    footer{
      margin-top:80px;

      color:#555;

      font-size:0.82rem;

      line-height:1.8;
    }

    @media (max-width:700px){

      h1{
        font-size:1.6rem;
      }

      .covers{
        gap:25px;
      }

      .covers img{
        width:260px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="covers">

      <img
        src="front_cover.png"
        alt="앞표지">

      <img
        src="back_cover.png"
        alt="뒷표지">

    </div>

    <h1>
      좌우익 종교인을 향한<br>
      불친절한 공개서한
    </h1>

    <div class="author">
      암흑망(暗黑網)
    </div>

    <div class="description">

      정치·종교·문명에 대한<br>
      선언적 에세이 PDF

    </div>

    <a
      class="download-button"
      href="unfriendly_open_letter_to_left_and_right_wing_religious_person.pdf">

      PDF 다운로드

    </a>

    <footer>

      v1.0<br>

      GitHub Pages Edition

    </footer>

  </div>

</body>

</html>

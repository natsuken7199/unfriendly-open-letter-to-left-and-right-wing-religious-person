<!DOCTYPE html>
<html lang="ko">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    좌우익 종교인을 향한 불친절한 공개서한
  </title>

  <style>

    html,
    body {

      margin: 0;
      padding: 0;

      background: #111;
    }

    #pdf-container {

      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {

      margin: 16px 0;
      box-shadow: 0 0 10px rgba(0,0,0,.5);
      background: white;
    }

    canvas {

      display: block;
      width: 100%;
      height: auto;
    }

  </style>

  <!-- pdf.js classic build -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</head>

<body>

  <div id="pdf-container"></div>

  <script>

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const url =
      './unfriendly_open_letter_to_left_and_right_wing_religious_person.pdf';

    const container =
      document.getElementById('pdf-container');

    async function renderPDF() {

      const pdf =
        await pdfjsLib.getDocument(url).promise;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {

        const page =
          await pdf.getPage(pageNum);

        const viewport =
          page.getViewport({ scale: 1 });

        const desiredWidth =
          Math.min(window.innerWidth * 0.95, 1000);

        const scale =
          desiredWidth / viewport.width;

        const scaledViewport =
          page.getViewport({ scale });

        const wrapper =
          document.createElement('div');

        wrapper.className = 'page';

        const canvas =
          document.createElement('canvas');

        const context =
          canvas.getContext('2d');

        canvas.width =
          scaledViewport.width;

        canvas.height =
          scaledViewport.height;

        wrapper.style.width =
          scaledViewport.width + 'px';

        wrapper.appendChild(canvas);

        container.appendChild(wrapper);

        await page.render({

          canvasContext: context,
          viewport: scaledViewport

        }).promise;
      }
    }

    renderPDF();

  </script>

</body>

</html>
